{% extends 'body.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-10 offset-md-1">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-bolt mr-2"></i> {{ title }}</h4>
                </div>
                <div class="card-body">
                    {% csrf_token %}

                    <!-- Provider Selection -->
                    <div class="form-group mb-3">
                        <label for="provider_id"><strong>Select Provider:</strong></label>
                        <select class="form-control" id="provider_id" required>
                            <option value="">Choose a provider...</option>
                            {% for provider in providers %}
                            <option value="{{ provider.id }}">{{ provider.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Items Section -->
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5>Order Items</h5>
                        </div>
                        <div class="card-body">
                            <div class="row mb-3">
                                <div class="col-md-8">
                                    <label for="pv1_input"><strong>Enter PV1:</strong></label>
                                    <input type="text" class="form-control" id="pv1_input" placeholder="Scan or type PV1...">
                                </div>
                                <div class="col-md-4">
                                    <label for="quantity_input"><strong>Quantity:</strong></label>
                                    <input type="number" class="form-control" id="quantity_input" placeholder="Qty" min="1" value="1">
                                </div>
                            </div>

                            <button type="button" class="btn btn-primary mb-3" id="add_item_btn">
                                <i class="fas fa-plus"></i> Add Item
                            </button>

                            <table class="table table-striped table-hover" id="items_table">
                                <thead class="table-dark">
                                    <tr>
                                        <th>PV1</th>
                                        <th>Product</th>
                                        <th>Unit Cost</th>
                                        <th class="iva-col" style="display:none">Unit Value (sin IVA)</th>
                                        <th class="iva-col" style="display:none">IVA</th>
                                        <th>Quantity</th>
                                        <th>Total</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="items_tbody"></tbody>
                            </table>

                            <div class="row mt-4">
                                <div class="col-md-6 offset-md-6">
                                    <div class="card bg-light">
                                        <div class="card-body">
                                            <h5>Order Summary</h5>
                                            <div class="d-flex justify-content-between mb-2">
                                                <span>Total Items:</span>
                                                <strong id="total_items">0</strong>
                                            </div>
                                            <div class="d-flex justify-content-between">
                                                <span>Total Cost:</span>
                                                <strong id="total_cost">$0.00</strong>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="hasIva" onchange="document.querySelectorAll('.iva-col').forEach(c => c.style.display = this.checked ? '' : 'none')">
                        <label class="form-check-label" for="hasIva">
                            <strong>Factura con IVA</strong>
                            <small class="text-muted">— Marca si este proveedor te facturó con IVA</small>
                        </label>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-4">
                        <button type="button" class="btn btn-success btn-lg" id="submit_btn">
                            <i class="fas fa-bolt"></i> Create Instant Order
                        </button>
                        <a href="/po/placed/" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block javascrip %}
<script>
const items = [];

function getCSRFToken() {
    const tokenInput = document.querySelector('[name=csrfmiddlewaretoken]');
    if (tokenInput) return tokenInput.value;
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, 10) === 'csrftoken=') {
                cookieValue = decodeURIComponent(cookie.substring(10));
                break;
            }
        }
    }
    return cookieValue;
}

function addItem() {
    const provider_id = document.getElementById('provider_id').value;
    const pv1 = document.getElementById('pv1_input').value.trim();
    const quantity = parseInt(document.getElementById('quantity_input').value) || 1;

    if (!provider_id) { alert('Please select a provider'); return; }
    if (!pv1) { alert('Please enter a PV1'); return; }
    if (quantity < 1) { alert('Quantity must be at least 1'); return; }

    const btn = document.getElementById('add_item_btn');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validating...';

    fetch(`/po/instant/lookup-pv1/?pv1=${encodeURIComponent(pv1)}&provider_id=${provider_id}`)
        .then(r => r.json())
        .then(data => {
            btn.disabled = false;
            btn.innerHTML = originalText;

            if (data.error) {
                alert(`PV1 Not Found: ${data.error}`);
                return;
            }

            const existingIndex = items.findIndex(item => item.pv1 === data.pv1);
            if (existingIndex !== -1) {
                items[existingIndex].quantity += quantity;
            } else {
                items.push({
                    product_id: data.product_id,
                    pv1: data.pv1,
                    product_name: data.product_name,
                    cost: data.cost,
                    quantity: quantity,
                });
            }

            document.getElementById('pv1_input').value = '';
            document.getElementById('quantity_input').value = '1';
            document.getElementById('pv1_input').focus();
            renderItems();
        })
        .catch(error => {
            btn.disabled = false;
            btn.innerHTML = originalText;
            alert('Connection error validating PV1');
        });
}

function renderItems() {
    const tbody = document.getElementById('items_tbody');
    tbody.innerHTML = '';
    let total_items = 0;
    let total_cost = 0;

    items.forEach((item, index) => {
        const item_total = item.cost * item.quantity;
        total_items += item.quantity;
        total_cost += item_total;

        const cost = parseFloat(item.cost);
        const unitSinIva = cost / 1.16;
        const ivaAmount = cost - unitSinIva;
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.pv1}</td>
            <td>${item.product_name}</td>
            <td>$${cost.toFixed(2)}</td>
            <td class="iva-col" style="display:none">$${unitSinIva.toFixed(2)}</td>
            <td class="iva-col" style="display:none">$${ivaAmount.toFixed(2)}</td>
            <td>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button type="button" class="btn btn-sm btn-danger" onclick="decrementItem(${index})">−</button>
                    <input type="number" class="form-control form-control-sm text-center" value="${item.quantity}" min="1" style="width: 60px;" readonly>
                    <button type="button" class="btn btn-sm btn-success" onclick="incrementItem(${index})">+</button>
                </div>
            </td>
            <td>$${item_total.toFixed(2)}</td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button></td>
        `;
        tbody.appendChild(row);
    });

    document.getElementById('total_items').textContent = total_items;
    document.getElementById('total_cost').textContent = `$${total_cost.toFixed(2)}`;
}

function incrementItem(index) {
    if (index >= 0 && index < items.length) { items[index].quantity += 1; renderItems(); }
}
function decrementItem(index) {
    if (index >= 0 && index < items.length && items[index].quantity > 1) { items[index].quantity -= 1; renderItems(); }
}
function removeItem(index) {
    if (index >= 0 && index < items.length && confirm(`Remove "${items[index].product_name}"?`)) {
        items.splice(index, 1);
        renderItems();
    }
}

function calculateTotal() {
    return items.reduce((sum, item) => sum + (item.cost * item.quantity), 0);
}

// Submit
document.getElementById('submit_btn').addEventListener('click', function() {
    const provider_id = document.getElementById('provider_id').value;
    if (!provider_id) { alert('Please select a provider'); return; }
    if (items.length === 0) { alert('Add at least one item'); return; }

    if (!confirm(`Create instant order with ${items.length} item(s)?\n\nTotal: $${calculateTotal().toFixed(2)}\n\nAll items will be ready to sale immediately.`)) return;

    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Instant Order...';

    const formData = new FormData();
    formData.append('provider_id', provider_id);
    formData.append('items', JSON.stringify(items));
    formData.append('has_iva', document.getElementById('hasIva').checked ? '1' : '0');

    fetch('/po/instant-full/submit/', {
        method: 'POST',
        body: formData,
        headers: { 'X-CSRFToken': csrftoken }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert(`✓ Instant Order Complete!\n\nPO: ${data.po_number}\n${data.message}`);
            window.location.href = '/po/placed/';
        } else {
            alert(`Error: ${data.error}`);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-bolt"></i> Create Instant Order';
        }
    })
    .catch(error => {
        alert('Connection error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-bolt"></i> Create Instant Order';
    });
});

// Event listeners
document.getElementById('quantity_input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addItem();
});
document.getElementById('pv1_input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('quantity_input').focus(); }
});
document.getElementById('add_item_btn').addEventListener('click', addItem);
</script>
{% endblock %}
