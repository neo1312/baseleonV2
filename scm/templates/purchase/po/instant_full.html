{% extends 'body.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-10 offset-md-1">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-bolt mr-2"></i> {{ title }}</h4>
                </div>
                <div class="card-body">
                    {% csrf_token %}

                    <!-- Provider Selection -->
                    <div class="form-group mb-3">
                        <label for="provider_id"><strong>Select Provider:</strong></label>
                        <select class="form-control" id="provider_id" required>
                            <option value="">Choose a provider...</option>
                            {% for provider in providers %}
                            <option value="{{ provider.id }}">{{ provider.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Items Section -->
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5>Order Items</h5>
                        </div>
                        <div class="card-body">
                            <div class="row mb-3">
                                <div class="col-md-8">
                                    <label for="pv1_input"><strong>Enter PV1:</strong></label>
                                    <input type="text" class="form-control" id="pv1_input" placeholder="Scan or type PV1...">
                                </div>
                                <div class="col-md-4">
                                    <label for="quantity_input"><strong>Quantity:</strong></label>
                                    <input type="number" class="form-control" id="quantity_input" placeholder="Qty" min="1" value="1">
                                </div>
                            </div>

                            <button type="button" class="btn btn-primary mb-3" id="add_item_btn">
                                <i class="fas fa-plus"></i> Add Item
                            </button>

                            <div class="table-fit">
                            <table class="table table-striped table-hover table-fit" id="items_table">
                                <thead class="table-dark">
                                    <tr>
                                        <th>SKU</th>
                                        <th>Qty</th>
                                        <th>Description</th>
                                        <th>Cost/U</th>
                                        <th>Cost/U + IVA</th>
                                        <th>IVA</th>
                                        <th>Total</th>
                                        <th>Total + IVA</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="items_tbody"></tbody>
                            </table>
                            </div>

                            <div class="row mt-4">
                                <div class="col-md-6 offset-md-6">
                                    <div class="card bg-light">
                                        <div class="card-body">
                                            <h5>Order Summary</h5>
                                            <div class="d-flex justify-content-between mb-2">
                                                <span>Total Items:</span>
                                                <strong id="total_items">0</strong>
                                            </div>
                                            <div class="d-flex justify-content-between">
                                                <span>Subtotal:</span>
                                                <strong id="total_cost">$0.00</strong>
                                            </div>
                                            <div class="d-flex justify-content-between">
                                                <span>Total + IVA:</span>
                                                <strong id="total_cost_iva">$0.00</strong>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- IVA Checkbox -->
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="hasIva" checked>
                        <label class="form-check-label" for="hasIva">
                            <strong>Factura con IVA</strong>
                            <small class="text-muted">— Marca si este proveedor te facturó con IVA</small>
                        </label>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-4">
                        <button type="button" class="btn btn-success btn-lg" id="submit_btn">
                            <i class="fas fa-bolt"></i> Create Instant Order
                        </button>
                        <a href="/po/placed/" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.table-fit { width: 100%; }
.table-fit table { width: 100%; font-size: 12px; }
.table-fit th,
.table-fit td { padding: 0.2rem 0.3rem; white-space: nowrap; }
.table-fit th { font-size: 11px; }
</style>
{% endblock %}

{% block javascrip %}
<script>
const items = [];

function hasIva() {
    return document.getElementById('hasIva').checked;
}

function addItem() {
    const provider_id = document.getElementById('provider_id').value;
    const pv1 = document.getElementById('pv1_input').value.trim();
    const quantity = parseInt(document.getElementById('quantity_input').value) || 1;

    if (!provider_id) { alert('Please select a provider'); return; }
    if (!pv1) { alert('Please enter a PV1'); return; }
    if (quantity < 1) { alert('Quantity must be at least 1'); return; }

    const btn = document.getElementById('add_item_btn');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validating...';

    fetch(`/po/instant/lookup-pv1/?pv1=${encodeURIComponent(pv1)}&provider_id=${provider_id}`)
        .then(r => r.json())
        .then(data => {
            btn.disabled = false;
            btn.innerHTML = originalText;

            if (data.error) {
                alert(`PV1 Not Found: ${data.error}`);
                return;
            }

            const rawCost = parseFloat(data.cost);
            const baseCost = hasIva() ? rawCost / 1.16 : rawCost;

            const existingIndex = items.findIndex(item => item.pv1 === data.pv1);
            if (existingIndex !== -1) {
                items[existingIndex].quantity += quantity;
            } else {
                items.push({
                    product_id: data.product_id,
                    pv1: data.pv1,
                    product_name: data.product_name,
                    cost: baseCost,
                    quantity: quantity,
                });
            }

            document.getElementById('pv1_input').value = '';
            document.getElementById('quantity_input').value = '1';
            document.getElementById('pv1_input').focus();
            renderItems();
        })
        .catch(error => {
            btn.disabled = false;
            btn.innerHTML = originalText;
            alert('Connection error validating PV1');
        });
}

function renderItems() {
    const tbody = document.getElementById('items_tbody');
    tbody.innerHTML = '';
    let total_items = 0;
    let total_cost = 0;
    let total_cost_iva = 0;

    items.forEach((item, index) => {
        const baseCost = parseFloat(item.cost);
        const costConIva = hasIva() ? baseCost * 1.16 : baseCost;
        const ivaAmount = costConIva - baseCost;
        const lineTotal = baseCost * item.quantity;
        const lineTotalIva = costConIva * item.quantity;

        total_items += item.quantity;
        total_cost += lineTotal;
        total_cost_iva += lineTotalIva;

        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.pv1}</td>
            <td>
                <input type="number" name="quantity" class="form-control form-control-sm" value="${item.quantity}" min="1" step="1"
                    data-index="${index}" onchange="updateQty(${index}, this.value)">
            </td>
            <td>${item.product_name}</td>
            <td>
                <input type="number" name="cost_base" class="form-control form-control-sm" value="${baseCost.toFixed(2)}" min="0" step="0.01"
                    data-index="${index}" onchange="updateCostBase(${index}, this.value)">
            </td>
            <td>
                <input type="number" name="cost_iva" class="form-control form-control-sm" value="${costConIva.toFixed(2)}" min="0" step="0.01"
                    data-index="${index}" onchange="updateCostConIva(${index}, this.value)">
            </td>
            <td>$${ivaAmount.toFixed(2)}</td>
            <td>$${lineTotal.toFixed(2)}</td>
            <td>$${lineTotalIva.toFixed(2)}</td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button></td>
        `;
        tbody.appendChild(row);
    });

    document.getElementById('total_items').textContent = total_items;
    document.getElementById('total_cost').textContent = `$${total_cost.toFixed(2)}`;
    document.getElementById('total_cost_iva').textContent = `$${total_cost_iva.toFixed(2)}`;
}

function updateQty(index, value) {
    if (index >= 0 && index < items.length) {
        if (value === '') { renderItems(); return; }
        const parsed = parseInt(value);
        if (!isNaN(parsed) && parsed >= 1) {
            items[index].quantity = parsed;
        }
    }
    renderItems();
}

function updateCostBase(index, value) {
    if (index >= 0 && index < items.length) {
        if (value === '') { renderItems(); return; }
        const parsed = parseFloat(value);
        if (!isNaN(parsed) && parsed >= 0) {
            items[index].cost = parsed;
        }
    }
    renderItems();
}

function updateCostConIva(index, value) {
    if (index >= 0 && index < items.length) {
        if (value === '') { renderItems(); return; }
        const parsed = parseFloat(value);
        if (!isNaN(parsed) && parsed >= 0) {
            items[index].cost = hasIva() ? parsed / 1.16 : parsed;
        }
    }
    renderItems();
}

function removeItem(index) {
    if (index >= 0 && index < items.length && confirm(`Remove "${items[index].product_name}"?`)) {
        items.splice(index, 1);
        renderItems();
    }
}

function calculateTotal() {
    return items.reduce((sum, item) => {
        const baseCost = parseFloat(item.cost);
        return sum + (baseCost * item.quantity);
    }, 0);
}

function calculateTotalIva() {
    return items.reduce((sum, item) => {
        const baseCost = parseFloat(item.cost);
        const costConIva = hasIva() ? baseCost * 1.16 : baseCost;
        return sum + (costConIva * item.quantity);
    }, 0);
}

// Submit
document.getElementById('submit_btn').addEventListener('click', function() {
    const provider_id = document.getElementById('provider_id').value;
    if (!provider_id) { alert('Please select a provider'); return; }
    if (items.length === 0) { alert('Add at least one item'); return; }

    const total = calculateTotal();
    const totalIva = calculateTotalIva();
    if (!confirm(`Create instant order with ${items.length} item(s)?\n\nSubtotal: $${total.toFixed(2)}\nTotal + IVA: $${totalIva.toFixed(2)}\n\nAll items will be ready to sale immediately.`)) return;

    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Instant Order...';

    const formData = new FormData();
    formData.append('provider_id', provider_id);
    formData.append('items', JSON.stringify(items));
    formData.append('has_iva', hasIva() ? '1' : '0');

    fetch('/po/instant-full/submit/', {
        method: 'POST',
        body: formData,
        headers: { 'X-CSRFToken': csrftoken }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert(`✓ Instant Order Complete!\n\nPO: ${data.po_number}\n${data.message}`);
            window.location.href = '/po/placed/';
        } else {
            alert(`Error: ${data.error}`);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-bolt"></i> Create Instant Order';
        }
    })
    .catch(error => {
        alert('Connection error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-bolt"></i> Create Instant Order';
    });
});

// Event listeners
document.getElementById('quantity_input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addItem();
});
document.getElementById('pv1_input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('quantity_input').focus(); }
});
document.getElementById('add_item_btn').addEventListener('click', addItem);
document.getElementById('hasIva').addEventListener('change', renderItems);
</script>
{% endblock %}
