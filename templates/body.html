{% extends 'home.html' %}
{% block body %}
    <body class="hold-transition layout-top-nav" style="background-color: #f5f5f5;">
    <div class="wrapper">
        <!-- Header -->
        {% include 'header.html' %}
        <!-- Content -->
        <div class="content-wrapper" style="background-color: #f5f5f5;">
            <div class="content pt-4">
                <div class="container-fluid">
                    <div class="card border-top-4 shadow-sm" style="border-top: 4px solid #0066cc;">
                        <div class="card-header bg-light border-bottom-0 pt-3 pb-2">
                            <h3 class="card-title font-weight-bold text-dark mb-0">
                                <i class="fas fa-list mr-2 text-primary"></i>{{ title }}
                            </h3>
                        </div>
                        {% block content %}
                        {% endblock %}
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer -->
        {% include 'footer.html' %}

    </div>
    </body>
    {%block javascrip%}
    {%endblock%}
{% endblock %}
