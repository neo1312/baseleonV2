{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>{{ title }} · Ferretería León</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0d0d0d;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        .landing {
            height: 100vh; height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(220,20,60,0.08) 0%, transparent 60%),
                linear-gradient(180deg, #111 0%, #0d0d0d 100%);
            padding: 40px 24px;
            position: relative;
        }
        .landing::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.08) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.12) 0%, transparent 100%);
            pointer-events: none;
        }
        .hex {
            font-size: 72px;
            color: #DC143C;
            line-height: 1;
            filter: drop-shadow(0 0 20px rgba(220,20,60,0.3));
            margin-bottom: 8px;
            position: relative;
        }
        .brand-line {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .brand-name {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .brand-name span {
            color: #DC143C;
        }
        .brand-sub {
            font-size: 14px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-bottom: 48px;
        }
        .btn-pos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #DC143C;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 20px 48px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 24px rgba(220,20,60,0.3);
            position: relative;
            min-width: 240px;
            min-height: 64px;
        }
        .btn-pos:active {
            transform: scale(0.97);
            box-shadow: 0 2px 12px rgba(220,20,60,0.2);
        }
        .btn-pos .icon {
            font-size: 28px;
        }
        .btn-display {
            margin-top: 16px;
            background: transparent;
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 48px;
        }
        .btn-display:active {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
        }
        .footer {
            position: absolute;
            bottom: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 1px;
        }
        @media (orientation: landscape) and (max-height: 600px) {
            .hex { font-size: 48px; }
            .brand-name { font-size: 32px; letter-spacing: 4px; }
            .brand-line { font-size: 18px; }
            .brand-sub { margin-bottom: 24px; font-size: 11px; }
            .btn-pos { padding: 14px 32px; font-size: 18px; min-width: 200px; min-height: 52px; }
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="hex">⬡</div>
        <div class="brand-line">FERRETERÍA</div>
        <div class="brand-name"><span>LEÓN</span></div>
        <div class="brand-sub">Sistema de Punto de Venta</div>

        <a href="{% url 'pos:index_touch' %}" class="btn-pos">
            <span class="icon">📱</span> Ir al POS Touch
        </a>

        <a href="{% url 'pos:index' %}" class="btn-display">
            🖥️ POS Escritorio
        </a>

        <div class="footer">Ferretería León &middot; v1.0</div>
    </div>
</body>
</html>
