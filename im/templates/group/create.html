{% extends 'body.html' %}

{% block content %}
<div class="container-fluid mt-4 px-2 px-sm-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <a href="{% url 'im:groupList' %}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i> Back to Groups
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-info">
                <div class="card-header bg-info text-white py-2">
                    <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Create Group</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="{% url 'im:groupCreate' %}">
                        {% csrf_token %}
                        <div class="form-group">
                            <label>Group Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter group name..." required autofocus>
                        </div>
                        <button type="submit" class="btn btn-info btn-block">
                            <i class="fas fa-check"></i> Create Group
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
